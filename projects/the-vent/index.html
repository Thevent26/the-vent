<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vent - Anonymous Rants</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>The Vent</h1>
    <p>Let it out anonymously. Rants screened for safety.</p>
  </header>
  
  <section id="rant-form">
    <h2>Submit Your Rant</h2>
    <form action="https://formspree.io/f/{your-formspree-id}" method="POST">
      <textarea name="rant" placeholder="What's bugging you? (Anonymous)" required></textarea>
      <button type="submit">Vent It</button>
    </form>
    <p>Note: All rants reviewed before posting. No personal info collected.</p>
  </section>
  
  <section id="rant-feed">
    <h2>Recent Vents</h2>
    <!-- Rants will be loaded here via JS or manual update -->
    <div class="rant">Sample rant: Traffic is the worst!</div>
  </section>
  
  <script src="script.js"></script>
</body>
</html>
